<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Grading Results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Grading Results</h1>
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>

    <div th:if="${success}" class="alert alert-success">
        <strong>Grading completed successfully!</strong>
        <span th:text="'Processed ' + ${studentCount} + ' student(s).'"></span>
    </div>
    <div th:unless="${success}" class="alert alert-error">
        <strong>Grading encountered errors.</strong> Check the log below.
    </div>

    <div th:if="${success}" class="card">
        <h2>Download Reports</h2>
        <div class="download-buttons">
            <a href="/download/csv" class="btn btn-download">Download Score Sheet (CSV)</a>
            <a href="/download/excel" class="btn btn-download">Download Statistics Report (Excel)</a>
        </div>
    </div>

    <div class="card">
        <h2>Grading Log</h2>
        <div class="log-box">
            <p th:each="log : ${logs}" th:text="${log}" class="log-line"></p>
        </div>
    </div>
</div>
</body>
</html>

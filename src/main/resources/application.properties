# ============================================
# IS442 Auto Grading System - Spring Boot Config
# ============================================

# Server
server.port=8080

# File Upload Limits (student ZIPs can be large)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Thymeleaf (auto-reload templates during development)
spring.thymeleaf.cache=false

# Logging
logging.level.com.autogradingsystem=INFO
# ============================================================================
# application-cli.properties
# Spring Boot profile: cli
#
# FILE LOCATION: src/main/resources/application-cli.properties
# Activated by: --spring.profiles.active=cli
# Used by: run-cli.sh / run-cli.bat
#
# Runs the full grading pipeline without starting a web server.
# ============================================================================

# No web server needed for CLI mode
spring.main.web-application-type=none

# Suppress Spring Boot banner for cleaner output
spring.main.banner-mode=off

# Logging — suppress Spring noise, show grading output
logging.level.root=WARN
logging.level.com.autogradingsystem=INFO